name: Preview Build
on:
  workflow_dispatch:
    inputs:
jobs:
  libcore:
    name: Native Build (LibCore)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Golang Status
        run: find buildScript libcore/*.sh | xargs cat | sha1sum > golang_status
      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status
      - name: LibCore Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}
      - name: Install Golang
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25
      - name: Native Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib core
  build:
    name: Build OSS APK
    runs-on: ubuntu-latest
    needs:
      - libcore
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Golang Status
        run: find buildScript libcore/*.sh | xargs cat | sha1sum > golang_status
      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status
      - name: LibCore Cache
        uses: actions/cache@v4
        with:
          path: |
            app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-oss-${{ hashFiles('**/*.gradle.kts') }}
      - name: Gradle Build
        env:
          BUILD_PLUGIN: none
          APP_KEYSTORE_BASE64: ${{ secrets.APP_KEYSTORE_BASE64 }}
          APP_KEYSTORE_PASSWORD: ${{ secrets.APP_KEYSTORE_PASSWORD }}
          APP_KEYSTORE_ALIAS: ${{ secrets.APP_KEYSTORE_ALIAS }}
          APP_KEY_PASSWORD: ${{ secrets.APP_KEY_PASSWORD }}
          LEGACY_LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
          LEGACY_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          LEGACY_ALIAS_NAME: ${{ secrets.ALIAS_NAME }}
          LEGACY_ALIAS_PASS: ${{ secrets.ALIAS_PASS }}
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/25.0.8775105" >> local.properties
          ./run init action gradle
          if [ -n "${APP_KEYSTORE_BASE64}" ] && [ -n "${APP_KEYSTORE_PASSWORD}" ] && [ -n "${APP_KEYSTORE_ALIAS}" ] && [ -n "${APP_KEY_PASSWORD}" ]; then
            printf '%s' "${APP_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android_keystore.jks"
            ./gradlew app:assemblePreviewRelease \
              -Pandroid.injected.signing.store.file="${RUNNER_TEMP}/android_keystore.jks" \
              -Pandroid.injected.signing.store.password="${APP_KEYSTORE_PASSWORD}" \
              -Pandroid.injected.signing.key.alias="${APP_KEYSTORE_ALIAS}" \
              -Pandroid.injected.signing.key.password="${APP_KEY_PASSWORD}"
          else
            export LOCAL_PROPERTIES="${LEGACY_LOCAL_PROPERTIES}"
            export KEYSTORE_PASS="${LEGACY_KEYSTORE_PASS}"
            export ALIAS_NAME="${LEGACY_ALIAS_NAME}"
            export ALIAS_PASS="${LEGACY_ALIAS_PASS}"
            ./gradlew app:assemblePreviewRelease
          fi
          APKS=$(find app/build/outputs/apk -name '*.apk')
          if [ -z "${APKS}" ]; then
            echo "No preview APKs were produced."
            exit 1
          fi
          SIGNED_APK=""
          for apk in ${APKS}; do
            "${ANDROID_HOME}/build-tools/35.0.1/apksigner" verify "${apk}"
            if [ "${apk%-unsigned.apk}" != "${apk}" ]; then
              mv "${apk}" "${apk%-unsigned.apk}.apk"
              apk="${apk%-unsigned.apk}.apk"
            fi
            SIGNED_APK="${apk}"
          done
          APK="${SIGNED_APK}"
          if [ -z "${APK}" ]; then
            echo "No signed preview APKs were produced."
            exit 1
          fi
          APK=$(dirname "${APK}")
          echo "APK=$APK" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: APKs
          path: ${{ env.APK }}
